worker:
  engine: opencode
  role: intern
  mode: sync
  command: "opencode run \"/harness-intern Read and execute .pm/runtime/next-task.md exactly. Write .pm/runtime/worker-report.md and create one git commit for your task changes only.\" --file .pm/runtime/next-task.md"
  report_path: ".pm/runtime/worker-report.md"
  timeout_minutes: 30

branch_policy:
  supervisor_managed: true
  intern_commit_required: true
  auto_merge: false
  auto_push: false
